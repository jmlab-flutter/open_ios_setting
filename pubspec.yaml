name: open_ios_setting
description: "A Flutter plugin for opening iOS system settings pages. Supports opening the Settings app home page."
version: 0.0.1
homepage: https://github.com/jmlab-flutter/open_ios_setting
repository: https://github.com/jmlab-flutter/open_ios_setting
issue_tracker: https://github.com/jmlab-flutter/open_ios_setting/issues
topics:
  - ios
  - settings
  - plugin

environment:
  sdk: ^3.10.1
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: OpenIosSettingPlugin
